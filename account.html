<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Account — The Pretty Parcel by Neems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="account">
<div id="siteHeader"></div>

<div class="wrap">
  <div class="crumbs"><a href="index.html">Home</a><span>›</span>My Account</div>
  <div id="accountRoot"></div>
</div>

<div id="siteFooter"></div>
<script src="assets/data.js"></script>
<script src="assets/app.js?v=1.1"></script>
<script>
function panelBtn(id, label) { return `<button data-panel="${id}" onclick="showPanel('${id}')">${label}</button>`; }

let selectedAvatar = "🌸";

function renderAccount() {
  const u = getUser();
  const root = document.getElementById("accountRoot");
  if (!root) return;
  if (!u) {
    root.innerHTML = `<div class="empty"><div class="big">You're not logged in</div>
      <p>Log in with your mobile number to see your wishlist, orders and history.</p>
      <p style="margin-top:18px"><a class="btn btn-primary" href="login.html?next=account.html">Login with OTP</a></p></div>`;
    return;
  }

  selectedAvatar = u.avatar || "🌸";

  root.innerHTML = `
  <div class="account-layout">
    <nav class="account-nav" aria-label="Account sections">
      ${panelBtn("overview","Overview")}
      ${panelBtn("wishlist","Wishlist")}
      ${panelBtn("orders","Orders")}
      ${panelBtn("recent","Recently Viewed")}
      ${panelBtn("addresses","Addresses")}
      ${panelBtn("profile","Profile")}
      <button onclick="logout()" style="color:#C0533B">Log out</button>
    </nav>
    <div>
      <div class="panel" id="panel-overview">
        <h1 class="display" style="font-size:30px">Hello, ${selectedAvatar} ${u.name.split(" ")[0]} ♡</h1>
        <p style="color:var(--ink-soft);margin:6px 0 22px">Logged in as +91 ${u.mobile} · your history syncs across devices.</p>
        <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
          <div class="kpi"><div class="label">Orders</div><div class="value" id="kpiOrders">0</div></div>
          <div class="kpi"><div class="label">Wishlist</div><div class="value" id="kpiWish">0</div></div>
          <div class="kpi"><div class="label">Recently viewed</div><div class="value" id="kpiRV">0</div></div>
        </div>
      </div>

      <div class="panel" id="panel-wishlist">
        <h2 style="font-size:26px;margin-bottom:16px">Wishlist</h2>
        <div class="grid" id="wishGrid" style="grid-template-columns:repeat(3,1fr)"></div>
        <div class="empty" id="wishEmpty" style="display:none"><div class="big">Nothing saved yet</div><p>Tap the ♡ on any product to keep it here.</p></div>
      </div>

      <div class="panel" id="panel-orders">
        <h2 style="font-size:26px;margin-bottom:16px">Orders</h2>
        <div id="ordersList"></div>
      </div>

      <div class="panel" id="panel-recent">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
          <h2 style="font-size:26px">Recently Viewed</h2>
          <button class="btn btn-ghost btn-sm" onclick="clearRecentlyViewed();renderPanels();toast('History cleared')">Clear all</button>
        </div>
        <div class="grid" id="rvGrid" style="grid-template-columns:repeat(3,1fr)"></div>
        <div class="empty" id="rvEmpty" style="display:none"><div class="big">No history yet</div><p>Products you view will appear here, synced to your account.</p></div>
      </div>

      <div class="panel" id="panel-addresses">
        <h2 style="font-size:26px;margin-bottom:16px">Saved Addresses</h2>
        <div id="addressesList"></div>
        <button class="btn btn-outline btn-sm" onclick="openNewAddressForm()">+ Add new address</button>
        
        <!-- Address Form -->
        <div id="addressFormContainer" style="display:none; margin-top:20px; background:var(--peach-mist); border:1px solid var(--line); border-radius:var(--radius); padding:20px; text-align:left;">
          <h3 style="font-family:var(--font-body); font-size:15px; font-weight:600; margin-bottom:12px;" id="addressFormTitle">Add New Address</h3>
          <form id="addressForm" onsubmit="submitAddressForm(event)">
            <input type="hidden" id="addrId">
            <div class="field">
              <label for="addrLabel">Address Label (e.g. Home, Office)</label>
              <input id="addrLabel" placeholder="e.g. Home" required style="padding:10px 14px; border-radius:8px;">
            </div>
            <div class="field">
              <label for="addrName">Recipient Name</label>
              <input id="addrName" placeholder="e.g. Ananya Sharma" required style="padding:10px 14px; border-radius:8px;">
            </div>
            <div class="field">
              <label for="addrLine">Address Line</label>
              <input id="addrLine" placeholder="e.g. Apartment, Road, Area" required style="padding:10px 14px; border-radius:8px;">
            </div>
            <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
              <div class="field">
                <label for="addrCity">City</label>
                <input id="addrCity" placeholder="e.g. Bengaluru" required style="padding:10px 14px; border-radius:8px;">
              </div>
              <div class="field">
                <label for="addrPincode">Pincode</label>
                <input id="addrPincode" placeholder="6-digit pincode" required pattern="[0-9]{6}" style="padding:10px 14px; border-radius:8px;">
              </div>
            </div>
            <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
              <div class="field">
                <label for="addrState">State</label>
                <input id="addrState" placeholder="e.g. Karnataka" required style="padding:10px 14px; border-radius:8px;">
              </div>
              <div class="field">
                <label for="addrPhone">Phone Number</label>
                <input id="addrPhone" placeholder="10-digit number" required pattern="[6-9][0-9]{9}" style="padding:10px 14px; border-radius:8px;">
              </div>
            </div>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft); cursor:pointer; margin-bottom:14px;">
              <input type="checkbox" id="addrDefault" style="accent-color:var(--rose); width:16px; height:16px;"> Set as default address
            </label>
            <div style="display:flex; gap:10px;">
              <button class="btn btn-primary btn-sm" type="submit">Save Address</button>
              <button class="btn btn-outline btn-sm" type="button" onclick="cancelAddressForm()">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <div class="panel" id="panel-profile">
        <h2 style="font-size:26px;margin-bottom:16px">Profile</h2>
        <div class="field" style="max-width:380px"><label>Full name</label><input id="profName" value="${u.name}" style="padding:10px 14px; border-radius:8px;"></div>
        <div class="field" style="max-width:380px"><label>Email Address</label><input id="profEmail" value="${u.email || ""}" placeholder="e.g. name@domain.com" style="padding:10px 14px; border-radius:8px;"></div>
        <div class="field" style="max-width:380px"><label>Mobile</label><input value="+91 ${u.mobile}" disabled style="background:var(--peach-mist); padding:10px 14px; border-radius:8px;"></div>
        
        <div class="field" style="max-width:380px; margin-bottom: 20px;">
          <label>Profile Avatar</label>
          <div style="display:flex; gap:10px; margin-top:8px;">
            ${["🌸","✨","💎","🎀","👑"].map(av => `
              <button onclick="selectAvatar('${av}')" class="icon-btn" style="font-size:22px; border:2px solid ${selectedAvatar === av ? "var(--rose)" : "transparent"}; border-radius:50%; width:44px; height:44px; background:var(--peach-soft); padding:0; display:flex; align-items:center; justify-content:center; cursor:pointer;">${av}</button>
            `).join("")}
          </div>
        </div>
        
        <button class="btn btn-primary btn-sm" onclick="saveProfile()">Save changes</button>
      </div>
    </div>
  </div>`;
  renderPanels();
  showPanel((location.hash || "#overview").slice(1));
}

function renderPanels() {
  const wish = getWish().map(byId).filter(Boolean);
  renderCards(document.getElementById("wishGrid"), wish);
  document.getElementById("wishEmpty").style.display = wish.length ? "none" : "";

  const rv = getRecentlyViewed().map(byId).filter(Boolean);
  renderCards(document.getElementById("rvGrid"), rv);
  document.getElementById("rvEmpty").style.display = rv.length ? "none" : "";

  // Render visual orders list
  const orders = store.get("orders", []);
  document.getElementById("ordersList").innerHTML = orders.length ? orders.map(o => `
    <div class="order">
      <div>
        <div class="oid">#${o.id}</div>
        <div class="meta">${o.date} · ${o.items.reduce((s,i)=>s+i.qty,0)} item(s) · ${INR(o.total)}</div>
        
        <!-- Display ordered products with thumbnails -->
        <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
          ${o.items.map(i => {
            const itemP = byId(i.id);
            if (!itemP) return "";
            return `
              <div style="display:flex; align-items:center; gap:8px; background:var(--peach-mist); border:1px solid var(--line); border-radius:8px; padding:6px 10px;">
                <span style="width:24px; height:24px; border-radius:4px; overflow:hidden; display:inline-block; flex-shrink:0;">${productSVG(itemP)}</span>
                <span style="font-size:12px; font-weight:500;">${itemP.name} <span style="color:var(--ink-soft); font-weight:normal;">x${i.qty}</span></span>
              </div>
            `;
          }).join("")}
        </div>
      </div>
      <span class="status ${o.status}">${o.status}</span>
    </div>`).join("")
    : `<div class="empty"><div class="big">No orders yet</div><p>Your parcels will show up here once you place an order.</p></div>`;

  // Render Address list
  const addresses = getAddresses();
  document.getElementById("addressesList").innerHTML = addresses.length ? `
    <div class="address-grid">
      ${addresses.map(a => `
        <div class="address-card ${a.isDefault ? "default" : ""}">
          ${a.isDefault ? `<span class="address-badge">Default</span>` : ""}
          <strong>${a.label}</strong>
          <div style="font-size:13px; color:var(--ink-soft); margin-top:4px; line-height: 1.5;">
            ${a.name}<br>${a.line}<br>${a.city}, ${a.state} ${a.pincode}<br>Phone: ${a.phone}
          </div>
          <div class="actions">
            <button onclick="editAddress('${a.id}')">Edit</button>
            <button onclick="removeAddress('${a.id}')">Delete</button>
            ${!a.isDefault ? `<button onclick="makeDefaultAddress('${a.id}')">Make Default</button>` : ""}
          </div>
        </div>
      `).join("")}
    </div>
  ` : `<p style="color:var(--ink-soft); margin-bottom:14px; text-align:left;">No saved addresses yet.</p>`;

  const u = getUser();
  document.getElementById("kpiOrders").textContent = orders.length;
  document.getElementById("kpiWish").textContent = wish.length;
  document.getElementById("kpiRV").textContent = rv.length;
}

function showPanel(id) {
  if (!document.getElementById("panel-" + id)) id = "overview";
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("on"));
  document.querySelectorAll(".account-nav button[data-panel]").forEach(b => b.classList.toggle("on", b.dataset.panel === id));
  const el = document.getElementById("panel-" + id);
  if (el) el.classList.add("on");
  history.replaceState(null, "", "#" + id);
}

function selectAvatar(av) {
  selectedAvatar = av;
  const buttons = document.querySelectorAll("#panel-profile button.icon-btn");
  buttons.forEach(b => {
    b.style.borderColor = b.textContent === av ? "var(--rose)" : "transparent";
  });
}

function saveProfile() {
  const u = getUser();
  u.name = document.getElementById("profName").value.trim() || u.name;
  u.email = document.getElementById("profEmail").value.trim() || u.email || "";
  u.avatar = selectedAvatar;
  setUser(u);
  toast("Profile updated ✓");
  renderAccount();
  renderHeader("account");
}

function logout() { setUser(null); toast("Logged out"); setTimeout(() => location.href = "index.html", 700); }

/* --- Address form handlers --- */
function openNewAddressForm() {
  document.getElementById("addressFormTitle").textContent = "Add New Address";
  document.getElementById("addressForm").reset();
  document.getElementById("addrId").value = "";
  document.getElementById("addressFormContainer").style.display = "block";
  document.getElementById("addrLabel").focus();
}

function editAddress(id) {
  const list = getAddresses();
  const a = list.find(x => x.id === id);
  if (!a) return;
  document.getElementById("addressFormTitle").textContent = "Edit Address";
  document.getElementById("addrId").value = a.id;
  document.getElementById("addrLabel").value = a.label;
  document.getElementById("addrName").value = a.name;
  document.getElementById("addrLine").value = a.line;
  document.getElementById("addrCity").value = a.city;
  document.getElementById("addrPincode").value = a.pincode;
  document.getElementById("addrState").value = a.state;
  document.getElementById("addrPhone").value = a.phone;
  document.getElementById("addrDefault").checked = a.isDefault;
  
  document.getElementById("addressFormContainer").style.display = "block";
  document.getElementById("addrLabel").focus();
}

function cancelAddressForm() {
  document.getElementById("addressFormContainer").style.display = "none";
}

function submitAddressForm(e) {
  e.preventDefault();
  const id = document.getElementById("addrId").value;
  const label = document.getElementById("addrLabel").value.trim();
  const name = document.getElementById("addrName").value.trim();
  const line = document.getElementById("addrLine").value.trim();
  const city = document.getElementById("addrCity").value.trim();
  const pincode = document.getElementById("addrPincode").value.trim();
  const state = document.getElementById("addrState").value.trim();
  const phone = document.getElementById("addrPhone").value.trim();
  const isDefault = document.getElementById("addrDefault").checked;

  saveAddress({
    id: id || null,
    label, name, line, city, pincode, state, phone, isDefault
  });

  toast(id ? "Address updated ✓" : "Address saved ✓");
  document.getElementById("addressFormContainer").style.display = "none";
  renderPanels();
}

function removeAddress(id) {
  if (confirm("Are you sure you want to delete this address?")) {
    deleteAddress(id);
    toast("Address deleted");
    renderPanels();
  }
}

function makeDefaultAddress(id) {
  setDefaultAddress(id);
  toast("Default address updated ✓");
  renderPanels();
}

document.addEventListener("DOMContentLoaded", renderAccount);
window.addEventListener("hashchange", () => showPanel(location.hash.slice(1)));
</script>
</body>
</html>
