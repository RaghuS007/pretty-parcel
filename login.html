<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — The Pretty Parcel by Neems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="login">
<div id="siteHeader"></div>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- Step 1: name + mobile -->
    <div id="step1">
      <h1>Welcome back ♡</h1>
      <p class="sub">No passwords here — just your name and number, and we'll send a one-time code.</p>
      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" placeholder="e.g. Ananya Sharma" autocomplete="name">
      </div>
      <div class="field">
        <label for="mobile">Mobile number</label>
        <input id="mobile" placeholder="10-digit mobile number" inputmode="numeric" maxlength="10" autocomplete="tel">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="sendOTP()">Send OTP</button>
      <p class="demo-hint">Prototype note: the demo OTP is always <strong>123456</strong>.</p>
    </div>

    <!-- Step 2: OTP entry -->
    <div id="step2" style="display:none">
      <h1>Enter your code</h1>
      <p class="sub">We've sent a 6-digit OTP to <strong id="otpMobile"></strong>. <button class="remove-link" onclick="backToStep1()" style="margin:0">Change</button></p>
      <div class="otp-row" id="otpRow">
        <input maxlength="1" inputmode="numeric" aria-label="Digit 1"><input maxlength="1" inputmode="numeric" aria-label="Digit 2"><input maxlength="1" inputmode="numeric" aria-label="Digit 3"><input maxlength="1" inputmode="numeric" aria-label="Digit 4"><input maxlength="1" inputmode="numeric" aria-label="Digit 5"><input maxlength="1" inputmode="numeric" aria-label="Digit 6">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="verifyOTP()">Verify &amp; Continue</button>
      <p class="resend">Didn't get it? <button id="resendBtn" onclick="resend()" disabled>Resend OTP (<span id="timer">30</span>s)</button></p>
      <p class="demo-hint">Prototype note: enter <strong>123456</strong> to log in.</p>
    </div>

    <!-- Step 3: success -->
    <div id="step3" style="display:none">
      <h1>You're in! ✓</h1>
      <p class="sub" id="successMsg"></p>
      <a class="btn btn-primary" style="width:100%" href="index.html" id="continueBtn">Continue shopping</a>
    </div>

  </div>
</div>

<div id="siteFooter"></div>
<script src="assets/data.js"></script>
<script src="assets/app.js?v=1.1"></script>
<script>
let timerInt, pendingUser = null;
const next = new URLSearchParams(location.search).get("next");

function sendOTP() {
  const name = document.getElementById("fullName").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  if (name.length < 2) return toast("Please enter your full name");
  if (!/^[6-9]\d{9}$/.test(mobile)) return toast("Please enter a valid 10-digit mobile number");
  pendingUser = { name, mobile };
  document.getElementById("otpMobile").textContent = "+91 " + mobile;
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "";
  startTimer();
  document.querySelector("#otpRow input").focus();
  toast("OTP sent to +91 " + mobile);
}
function backToStep1() {
  clearInterval(timerInt);
  document.getElementById("step2").style.display = "none";
  document.getElementById("step1").style.display = "";
}
function startTimer() {
  let t = 30; const btn = document.getElementById("resendBtn"), span = document.getElementById("timer");
  btn.disabled = true; span.textContent = t;
  btn.firstChild.textContent = "Resend OTP (";
  clearInterval(timerInt);
  timerInt = setInterval(() => {
    t--; span.textContent = t;
    if (t <= 0) { clearInterval(timerInt); btn.disabled = false; btn.innerHTML = "Resend OTP"; }
  }, 1000);
}
function resend() { toast("OTP re-sent ✓"); document.getElementById("resendBtn").innerHTML = 'Resend OTP (<span id="timer">30</span>)s'; startTimer(); }

// auto-advance OTP boxes
document.addEventListener("DOMContentLoaded", () => {
  const boxes = [...document.querySelectorAll("#otpRow input")];
  boxes.forEach((b, i) => {
    b.addEventListener("input", () => { b.value = b.value.replace(/\D/g, ""); if (b.value && boxes[i+1]) boxes[i+1].focus(); });
    b.addEventListener("keydown", e => { if (e.key === "Backspace" && !b.value && boxes[i-1]) boxes[i-1].focus(); });
    b.addEventListener("paste", e => {
      const digits = (e.clipboardData.getData("text").match(/\d/g) || []).slice(0, 6);
      if (digits.length) { e.preventDefault(); digits.forEach((d, j) => boxes[j] && (boxes[j].value = d)); boxes[Math.min(digits.length, 5)].focus(); }
    });
  });
  if (getUser()) location.href = "account.html";
});

function verifyOTP() {
  const code = [...document.querySelectorAll("#otpRow input")].map(i => i.value).join("");
  if (code.length < 6) return toast("Please enter all 6 digits");
  if (code !== "123456") return toast("That code doesn't match — try 123456");
  clearInterval(timerInt);

  const isNew = !store.get("known_" + pendingUser.mobile, false);
  store.set("known_" + pendingUser.mobile, true);
  setUser(pendingUser);
  const mergedCount = mergeGuestHistory(pendingUser.mobile);   // guest → account merge (PRD §7)

  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "";
  document.getElementById("successMsg").innerHTML =
    (isNew ? `Welcome to the parcel family, <strong>${pendingUser.name.split(" ")[0]}</strong> — your account has been created.`
           : `Welcome back, <strong>${pendingUser.name.split(" ")[0]}</strong>.`) +
    (mergedCount ? `<br><span style="font-size:12.5px;color:var(--rose-deep)">${mergedCount} recently viewed item${mergedCount>1?"s":""} synced to your account ✓</span>` : "");
  if (next) document.getElementById("continueBtn").href = next;
  renderHeader("login");
}
</script>
</body>
</html>
