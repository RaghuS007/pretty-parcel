<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop — The Pretty Parcel by Neems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="shop">
<div id="siteHeader"></div>

<div class="wrap">
  <div class="crumbs"><a href="index.html">Home</a><span>›</span>Shop</div>
  <div class="shop-layout">
    <aside class="filters" aria-label="Filters">
      <div class="filter-group">
        <h4>Category</h4>
        <label><input type="checkbox" name="cat" value="demi-fine"> Demi-Fine Jewellery</label>
        <label><input type="checkbox" name="cat" value="oxidised"> Traditional &amp; Oxidised</label>
        <label><input type="checkbox" name="cat" value="hair"> Hair Accessories</label>
      </div>
      <div class="filter-group">
        <h4>Price</h4>
        <label><input type="radio" name="price" value="" checked> All prices</label>
        <label><input type="radio" name="price" value="0-500"> Under ₹500</label>
        <label><input type="radio" name="price" value="500-1000"> ₹500 – ₹1,000</label>
        <label><input type="radio" name="price" value="1000-2000"> ₹1,000 – ₹2,000</label>
        <label><input type="radio" name="price" value="2000-99999"> Above ₹2,000</label>
      </div>
      <div class="filter-group">
        <h4>Collection</h4>
        <div id="collectionFilters"></div>
      </div>
    </aside>

    <main>
      <div class="shop-toolbar">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="searchInput" type="search" placeholder="Search necklaces, jhumkas, clips…" aria-label="Search products">
        </div>
        <select class="sort" id="sortSelect" aria-label="Sort products">
          <option value="popular">Sort: Popularity</option>
          <option value="new">Sort: Newest</option>
          <option value="low">Price: Low to High</option>
          <option value="high">Price: High to Low</option>
        </select>
      </div>
      <p class="result-count" id="resultCount"></p>
      <div class="grid" id="shopGrid" style="margin-top:14px"></div>
      <div class="empty" id="shopEmpty" style="display:none">
        <div class="big">Nothing matches — yet</div>
        <p>Try clearing a filter or searching for something else.</p>
      </div>
    </main>
  </div>
</div>

<div id="siteFooter"></div>
<script src="assets/data.js"></script>
<script src="assets/app.js?v=1.1"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // collection filter options
  const collections = [...new Set(PRODUCTS.map(p => p.collection))];
  document.getElementById("collectionFilters").innerHTML =
    collections.map(c => `<label><input type="checkbox" name="coll" value="${c}"> ${c}</label>`).join("");

  // preselect category from URL (?cat=)
  const urlCat = new URLSearchParams(location.search).get("cat");
  if (urlCat) { const cb = document.querySelector(`input[name=cat][value="${urlCat}"]`); if (cb) cb.checked = true; }

  function apply() {
    const cats = [...document.querySelectorAll("input[name=cat]:checked")].map(i => i.value);
    const colls = [...document.querySelectorAll("input[name=coll]:checked")].map(i => i.value);
    const price = document.querySelector("input[name=price]:checked").value;
    const q = document.getElementById("searchInput").value.trim().toLowerCase();
    const sort = document.getElementById("sortSelect").value;

    let list = PRODUCTS.filter(p => {
      if (cats.length && !cats.includes(p.cat)) return false;
      if (colls.length && !colls.includes(p.collection)) return false;
      if (price) { const [lo, hi] = price.split("-").map(Number); if (p.price < lo || p.price > hi) return false; }
      if (q && ![p.name, p.sub, p.collection, ...p.tags].join(" ").toLowerCase().includes(q)) return false;
      return true;
    });
    if (sort === "low") list.sort((a, b) => a.price - b.price);
    else if (sort === "high") list.sort((a, b) => b.price - a.price);
    else if (sort === "new") list.sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
    else list.sort((a, b) => (b.reviews * b.rating) - (a.reviews * a.rating));

    document.getElementById("resultCount").textContent = list.length + " piece" + (list.length === 1 ? "" : "s");
    renderCards(document.getElementById("shopGrid"), list);
    document.getElementById("shopEmpty").style.display = list.length ? "none" : "";
  }
  document.querySelectorAll(".filters input, #sortSelect").forEach(el => el.addEventListener("change", apply));
  document.getElementById("searchInput").addEventListener("input", apply);
  apply();
});
</script>
</body>
</html>
